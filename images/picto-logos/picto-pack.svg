  <!-- Couvercle ouvert droit -->
  <path d="M100 60 L110 36 L60 36 L60 60" fill="none" stroke="#2F4A2A" stroke-width="3" stroke-linejoin="round"/>

  <!-- Ligne de pliure centrale -->
