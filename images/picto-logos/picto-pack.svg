  <path d="M70 28 C74 24 76 28 72 30 C69 31 65 30 65 28" fill="#C1502E"/>
  <path d="M70 28 C68 24 65 24 64 27" fill="none" stroke="#4B6B45" stroke-width="2" stroke-linecap="round"/>

  <!-- Contenu : petite boîte d'épices -->
  <rect x="74" y="44" width="16" height="14" rx="2" fill="none" stroke="#C8992C" stroke-width="2.2"/>
  <line x1="74" y1="49" x2="90" y2="49" stroke="#C8992C" stroke-width="1.5"/>
